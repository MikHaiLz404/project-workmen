<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workmen</title>
    <style>
/* shell: four-region grid responsive down to 1024x700 */
:root {
  color-scheme: light dark;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
  font-size: 14px;
  --shell-min-width: 1024px;
  --shell-min-height: 700px;
}
body, html, #root { margin: 0; padding: 0; height: 100%; width: 100%; }
.workmen-shell {
  display: grid;
  grid-template-areas: "header header" "rail workspace" "console console";
  grid-template-rows: 56px 1fr 96px;
  grid-template-columns: 200px 1fr;
  min-width: var(--shell-min-width);
  min-height: var(--shell-min-height);
  width: 100vw; height: 100vh;
  box-sizing: border-box;
}
.shell-header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(128,128,128,0.3); }
.shell-title { margin: 0; font-size: 18px; font-weight: 600; }
.shell-backend-status { font-size: 12px; opacity: 0.7; }
.shell-rail { grid-area: rail; border-right: 1px solid rgba(128,128,128,0.3); padding: 12px 0; }
.shell-rail ul { list-style: none; margin: 0; padding: 0; }
.shell-rail li { padding: 8px 16px; cursor: pointer; }
.shell-workspace { grid-area: workspace; padding: 16px; overflow: auto; }
.shell-console { grid-area: console; border-top: 1px solid rgba(128,128,128,0.3); padding: 8px 16px; font-family: ui-monospace, monospace; font-size: 12px; overflow: auto; }
@media (max-width: 1024px) { .workmen-shell { grid-template-columns: 160px 1fr; } }

/* ProjectHeader: label/value table layout */
.project-header { padding: 8px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; align-items: baseline; }
.project-header-row { display: contents; }
.project-header-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; }
.project-header-value { font-size: 14px; }
.project-header-readonly { grid-column: span 2; margin-top: 6px; padding: 4px 8px; background: rgba(60, 130, 200, 0.2); border: 1px solid rgba(60, 130, 200, 0.5); border-radius: 4px; font-size: 12px; font-weight: 600; text-align: center; }

/* ScanProgress: progress bar + cancel button */
.scan-progress { margin: 12px 0; padding: 8px; border: 1px solid rgba(128,128,128,0.3); border-radius: 4px; }
.scan-progress-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; }
.scan-progress-phase { font-weight: 600; text-transform: capitalize; }
.scan-progress-count { font-family: ui-monospace, monospace; }
.scan-progress-bar { width: 100%; height: 8px; background: rgba(128,128,128,0.2); border-radius: 4px; overflow: hidden; margin: 8px 0; }
.scan-progress-bar-fill { height: 100%; background: rgb(60, 130, 200); transition: width 80ms linear; }
.scan-progress-current { font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.7; word-break: break-all; }
.scan-progress-cancel { margin-top: 8px; padding: 4px 12px; }

/* OpenProject composition */
.open-project > header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.open-project > header h2 { margin: 0; font-size: 16px; font-weight: 600; }
.open-project-actions { display: flex; gap: 8px; }
.open-project-actions button { padding: 4px 12px; cursor: pointer; }
.open-project-phase { font-size: 12px; opacity: 0.7; margin-top: 8px; }
.open-project-error { color: rgb(220, 80, 80); font-family: ui-monospace, monospace; font-size: 12px; margin-top: 8px; }

/* generic buttons fallback (dark/light) */
button { background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.3); color: inherit; border-radius: 3px; font: inherit; }
button:hover { background: rgba(128,128,128,0.2); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="root" data-testid="workmen-root"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
